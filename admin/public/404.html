<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // This script will redirect to index.html with the original path
      // stored in sessionStorage so main.jsx can handle it.
      var path = window.location.pathname;
      sessionStorage.setItem('redirect_path', path);
      window.location.href = '/index.html';
    </script>
  </head>
  <body>
    If you are not redirected, <a href="/">click here</a>.
  </body>
</html>
