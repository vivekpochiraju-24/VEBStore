# Render Blueprint for VEBStore Deployment
# ========================================

services:
  # 🟢 Backend Web Service
  - type: web
    name: vebstore-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URL
        sync: false 
      - key: JWT_SECRET
        sync: false 
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # 🔵 Frontend Static Site
  - type: static
    name: vebstore-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: vebstore-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # 🔴 Admin Static Site
  - type: static
    name: vebstore-admin
    runtime: node
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: vebstore-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
